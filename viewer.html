<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>수원360°투어</title>
  <link rel="stylesheet" href="common/css/tour.css?v=20260721-v112">
</head>
<body>
  <main id="app" class="app" aria-busy="true" data-mobile-layout="split">
    <section id="pano-wrap" class="pano-wrap" aria-label="360도 파노라마">
      <div id="pano" class="pano"></div>

      <header id="topbar" class="topbar">
        <section id="home-logo"
                 class="brand-panel"
                 role="button"
                 tabindex="0"
                 title="메인화면"
                 aria-label="메인화면으로 이동">
          <img class="brand-logo" src="common/images/수원이.png" alt="">
          <div class="brand-copy">
            <strong class="brand-name">
              <span class="brand-service-name">수원360투어</span>
              <span class="brand-mobile-separator" aria-hidden="true">|</span>
              <span id="brand-content-title" class="brand-content-title"></span>
            </strong>
            <span id="shooting-date" class="shooting-date"></span>
          </div>
        </section>

        <section id="desktop-explorer" class="desktop-explorer" aria-label="콘텐츠 둘러보기">
          <div class="explorer-heading">
            <div class="explorer-title-wrap">
              <strong id="content-title" class="xml-title">불러오는 중…</strong>
            </div>
            <div class="explorer-tools">
              <button id="menu-all-toggle"
                      class="menu-tool-btn hamburger-btn"
                      type="button"
                      title="메뉴 접기"
                      aria-pressed="false"
                      aria-label="메뉴 접기">☰</button>
              <button id="menu-more-toggle"
                      class="menu-tool-btn menu-more-toggle"
                      type="button"
                      title="더보기"
                      aria-label="더보기"
                      aria-expanded="false"
                      aria-controls="menu-overflow"
                      hidden>⋯</button>
            </div>
          </div>
          <nav id="desktop-menu" class="desktop-menu" aria-label="장소 메뉴">
            <div id="menu-track" class="menu-track"></div>
          </nav>
          <div id="menu-overflow" class="menu-overflow" hidden></div>
        </section>

        <div class="top-actions">
          <button id="close-btn" class="top-action-btn circle-action-btn close-btn"
                  type="button" title="종료" aria-label="종료">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6L18 18M18 6L6 18"></path>
            </svg>
          </button>
          <button id="share-btn" class="top-action-btn circle-action-btn share-btn"
                  type="button" title="링크 공유" aria-label="링크 공유">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="18" cy="5" r="2.5"></circle>
              <circle cx="6" cy="12" r="2.5"></circle>
              <circle cx="18" cy="19" r="2.5"></circle>
              <path d="M8.2 10.8L15.8 6.2M8.2 13.2L15.8 17.8"></path>
            </svg>
          </button>
        </div>
      </header>

      <div id="status" class="status" role="status" aria-live="polite">초기화 중…</div>
    </section>

    <section id="mobile-panel" class="mobile-panel" aria-label="모바일 메뉴와 지도">
      <button id="mobile-menu-pill"
              class="mobile-panel-pill mobile-menu-pill"
              type="button"
              aria-label="둘러보기 감추기"
              aria-pressed="false">
        <svg class="pill-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6.5h16M4 12h16M4 17.5h16"></path>
        </svg>
        <span class="pill-label">둘러보기</span>
        <span class="pill-arrow" aria-hidden="true"></span>
      </button>

      <button id="mobile-map-pill"
              class="mobile-panel-pill mobile-map-pill"
              type="button"
              aria-label="미니맵 감추기"
              aria-pressed="false">
        <svg class="pill-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3.5 6.5l5-2.5 7 2.5 5-2.5v13.5l-5 2.5-7-2.5-5 2.5z"></path>
          <path d="M8.5 4v13.5M15.5 6.5V20"></path>
        </svg>
        <span class="pill-label">미니맵</span>
        <span class="pill-arrow" aria-hidden="true"></span>
      </button>

      <div id="mobile-menu-pane" class="mobile-pane mobile-menu-pane">
        <div id="mobile-menu-list" class="mobile-menu-list"></div>
      </div>

      <div id="map-pane" class="mobile-pane map-pane">
        <div id="map" class="map" aria-label="카카오 미니맵"></div>
      </div>
    </section>

    <button id="panel-toggle" class="panel-toggle" type="button"
            aria-expanded="true" aria-label="메뉴와 지도 전체 숨김"
            title="숨기기">
      <span class="panel-toggle-arrow" aria-hidden="true">⌄</span>
      <span class="panel-toggle-label">숨기기</span>
    </button>
  </main>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1a15c2b3de97ed23c1f54005bd1b96a8&autoload=false"></script>
  <script src="common/krpano/tour.js"></script>
  <script src="common/js/app.js?v=20260721-v99"></script>
  <script src="common/js/panorama.js"></script>
  <script src="common/js/menu.js?v=20260721-v112"></script>
  <script src="common/js/map.js?v=20260721-v99"></script>
</body>
</html>
