<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>수원360°투어</title>
  <link rel="stylesheet" href="common/css/tour.css?v=20260721-v100">
</head>
<body>
  <main id="app" class="app" aria-busy="true" data-mobile-layout="split">
    <section id="pano-wrap" class="pano-wrap" aria-label="360도 파노라마">
      <div id="pano" class="pano"></div>

      <header id="topbar" class="topbar">
        <section id="home-logo" class="brand-panel" role="button" tabindex="0"
                 title="메인화면" aria-label="메인화면으로 이동">
          <img class="brand-logo" src="common/images/수원이.png" alt="">
          <div class="brand-copy">
            <strong class="brand-name">수원360°투어</strong>
            <span id="shooting-date" class="shooting-date"></span>
          </div>
        </section>

        <section id="desktop-explorer" class="desktop-explorer" aria-label="콘텐츠 둘러보기">
          <div class="explorer-heading">
            <div class="explorer-title-wrap">
              <strong id="content-title" class="xml-title">불러오는 중…</strong>
            </div>
            <div class="explorer-tools">
              <button id="menu-all-toggle" class="menu-tool-btn hamburger-btn" type="button"
                      title="메뉴 접기" aria-pressed="false" aria-label="메뉴 접기">☰</button>
              <button id="menu-more-toggle" class="menu-tool-btn menu-more-toggle" type="button"
                      title="더보기" aria-label="더보기" aria-expanded="false"
                      aria-controls="menu-overflow" hidden>⋯</button>
            </div>
          </div>
          <nav id="desktop-menu" class="desktop-menu" aria-label="장소 메뉴">
            <div id="menu-track" class="menu-track"></div>
          </nav>
          <div id="menu-overflow" class="menu-overflow" hidden></div>
        </section>

        <div class="top-actions">
          <button id="close-btn" class="top-action-btn circle-action-btn close-btn"
                  type="button" title="종료" aria-label="종료">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6L18 18M18 6L6 18"></path></svg>
          </button>
          <button id="share-btn" class="top-action-btn circle-action-btn share-btn"
                  type="button" title="링크 공유" aria-label="링크 공유">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="18" cy="5" r="2.5"></circle><circle cx="6" cy="12" r="2.5"></circle>
              <circle cx="18" cy="19" r="2.5"></circle>
              <path d="M8.2 10.8L15.8 6.2M8.2 13.2L15.8 17.8"></path>
            </svg>
          </button>
        </div>
      </header>

      <div id="status" class="status" role="status" aria-live="polite">초기화 중…</div>
    </section>

    <section id="mobile-panel" class="mobile-panel" aria-label="모바일 메뉴와 지도">
      <div id="mobile-menu-pane" class="mobile-pane mobile-menu-pane">
        <header class="mobile-pane-header menu-pane-header">
          <strong>둘러보기</strong>
          <button id="mobile-menu-hide" class="pane-arrow menu-hide-arrow"
                  type="button" aria-label="메뉴 감추기"></button>
          <button id="mobile-map-show" class="pane-arrow map-show-arrow"
                  type="button" aria-label="지도 나타내기"></button>
        </header>
        <div id="mobile-menu-list" class="mobile-menu-list"></div>
      </div>

      <div id="map-pane" class="mobile-pane map-pane">
        <header class="mobile-pane-header map-pane-header">
          <strong>미니맵</strong>
          <button id="mobile-menu-show" class="pane-arrow menu-show-arrow"
                  type="button" aria-label="메뉴 나타내기"></button>
          <button id="mobile-map-hide" class="pane-arrow map-hide-arrow"
                  type="button" aria-label="지도 감추기"></button>
        </header>
        <div id="map" class="map" aria-label="카카오 미니맵"></div>
      </div>
    </section>

    <button id="panel-toggle" class="panel-toggle" type="button"
            aria-expanded="true" aria-label="메뉴와 지도 전체 숨김"
            title="메뉴·지도 숨기기">
      <span class="panel-toggle-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path class="icon-hide" d="M8 9l4 4 4-4M8 4l4 4 4-4M8 20l4-4 4 4"></path>
          <path class="icon-show" d="M8 8l4-4 4 4M8 16l4 4 4-4"></path>
        </svg>
      </span>
      <span class="panel-toggle-label">메뉴·지도 전체보기</span>
      <span class="panel-toggle-tooltip" role="tooltip">메뉴·지도 숨기기</span>
    </button>
  </main>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1a15c2b3de97ed23c1f54005bd1b96a8&autoload=false"></script>
  <script src="common/krpano/tour.js"></script>
  <script src="common/js/app.js?v=20260720-v96"></script>
  <script src="common/js/panorama.js"></script>
  <script src="common/js/menu.js?v=20260721-v100"></script>
  <script src="common/js/map.js?v=20260720-menu-map-v94"></script>
</body>
</html>
